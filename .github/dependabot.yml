version: 2
updates:
  - package-ecosystem: "nuget"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    groups:
      all-packages:
        patterns:
          - "*"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    groups:
      all-images:
        patterns:
          - "*"

  - package-ecosystem: "docker"
    directory: "/src/APITemplate.Api"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 2
    groups:
      all-images:
        patterns:
          - "*"
