name: On-Demand Security Scan

on:
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.x'

jobs:
  security:
    name: Security (SBOM & Trivy)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Generate SBOM
        run: |
          dotnet tool install --global CycloneDX
          dotnet restore APITemplate.slnx
          mkdir -p sbom
          $HOME/.dotnet/tools/dotnet-CycloneDX src/APITemplate/Api/APITemplate.csproj -o sbom/ --output-format json
        shell: bash

      - name: Upload SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom/
          retention-days: 7

      - name: Build Docker image
        run: docker build -t apitemplate-api:local -f src/APITemplate/Api/Dockerfile .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: 'apitemplate-api:local'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
