name: PR Validation

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches:
      - main
      - dev
  push:
    branches:
      - main

jobs:
  build-and-test:
    name: Build and Test
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        env:
          RESTORE_TOOLS: '0'
          HUSKY: '0'
        run: dotnet restore APITemplate.slnx

      - name: Build
        env:
          RESTORE_TOOLS: '0'
          HUSKY: '0'
        run: dotnet build APITemplate.slnx --no-restore --configuration Release

      - name: Run tests
        env:
          RESTORE_TOOLS: '0'
          HUSKY: '0'
        run: dotnet test APITemplate.slnx --no-build --no-restore --configuration Release --verbosity normal --collect:"XPlat Code Coverage" --results-directory ./coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: ./coverage/**/coverage.cobertura.xml
          retention-days: 7
