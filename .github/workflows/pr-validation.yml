name: PR Validation

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches:
      - main
      - dev
  push:
    branches:
      - main


env:
  DOTNET_VERSION: '10.0.x'
  HUSKY: '0'
  RESTORE_TOOLS: '0'

jobs:
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.props') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore APITemplate.slnx

      - name: Build
        run: dotnet build APITemplate.slnx --no-restore --configuration Release

      - name: Run unit tests
        run: >
          dotnet test APITemplate.slnx
          --no-build --no-restore --configuration Release --verbosity normal
          --logger "trx;LogFileName=unit-results.trx"
          --collect:"XPlat Code Coverage"
          --results-directory ./test-results/unit

      - name: Publish unit test results
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Unit Test Results
          path: ./test-results/unit/**/*.trx
          reporter: dotnet-trx
          fail-on-error: false

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: ./test-results/unit/**/coverage.cobertura.xml
          retention-days: 7

  docker-tests:
    name: ${{ matrix.display_name }}
    needs: [unit]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: smoke
            display_name: Smoke Tests
            filter: Category=Smoke
          - id: integration
            display_name: Integration Tests
            filter: Category=Integration

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.props') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore APITemplate.slnx

      - name: Build
        run: dotnet build APITemplate.slnx --no-restore --configuration Release

      - name: Run ${{ matrix.id }} tests
        run: >
          dotnet test APITemplate.slnx
          --no-build --no-restore --configuration Release --verbosity normal
          --filter "${{ matrix.filter }}"
          --logger "trx;LogFileName=${{ matrix.id }}-results.trx"
          --results-directory ./test-results/${{ matrix.id }}
          /p:RunDockerIntegration=true

      - name: Publish ${{ matrix.id }} test results
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: ${{ matrix.display_name }} Results
          path: ./test-results/${{ matrix.id }}/**/*.trx
          reporter: dotnet-trx
          fail-on-error: false
