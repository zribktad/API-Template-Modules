name: PR Validation

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
    branches:
      - main
      - dev
  push:
    branches:
      - main


env:
  DOTNET_VERSION: '10.0.x'
  HUSKY: '0'
  RESTORE_TOOLS: '0'

jobs:
  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.props') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Restore dependencies
        run: dotnet restore APITemplate.slnx

      - name: Build
        run: dotnet build APITemplate.slnx --no-restore --configuration Release

      - name: Upload build output
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: |
            **/bin/Release/
            **/obj/Release/
          retention-days: 1

      - name: Run unit tests
        run: >
          dotnet test APITemplate.slnx
          --no-build --no-restore --configuration Release --verbosity normal
          --logger "trx;LogFileName=unit-results.trx"
          --collect:"XPlat Code Coverage"
          --results-directory ./test-results/unit

      - name: Publish unit test results
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Unit Test Results
          path: ./test-results/unit/**/*.trx
          reporter: dotnet-trx

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: ./test-results/unit/**/coverage.cobertura.xml
          retention-days: 7

  smoke:
    name: Smoke Tests
    needs: [unit]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: build-output

      - name: Run smoke tests
        run: >
          dotnet test APITemplate.slnx
          --no-build --no-restore --configuration Release --verbosity normal
          --logger "trx;LogFileName=smoke-results.trx"
          --results-directory ./test-results/smoke
          /p:RunDockerIntegration=true
          -- RunConfiguration.TestCaseFilter="Category=Smoke"

      - name: Publish smoke test results
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Smoke Test Results
          path: ./test-results/smoke/**/*.trx
          reporter: dotnet-trx

  integration:
    name: Integration Tests
    needs: [unit]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Download build output
        uses: actions/download-artifact@v4
        with:
          name: build-output

      - name: Run integration tests
        run: >
          dotnet test APITemplate.slnx
          --no-build --no-restore --configuration Release --verbosity normal
          --logger "trx;LogFileName=integration-results.trx"
          --results-directory ./test-results/integration
          /p:RunDockerIntegration=true
          -- RunConfiguration.TestCaseFilter="Category=Integration.Docker"

      - name: Publish integration test results
        uses: dorny/test-reporter@v3
        if: always()
        with:
          name: Integration Test Results
          path: ./test-results/integration/**/*.trx
          reporter: dotnet-trx
