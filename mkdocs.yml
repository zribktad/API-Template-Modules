site_name: APITemplate Modules
site_url: https://zribktad.github.io/API-Template-Modules/
site_description: Modern .NET 10 Web API and Data-Driven applications template.

theme:
  name: material
  language: en
  icon:
    logo: material/library
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - toc.follow
    - toc.integrate
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tooltips

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/zribktad/API-Template-Modules

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - def_list
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      check_paths: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:pymdownx.emoji.twemoji
      emoji_generator: !!python/name:pymdownx.emoji.to_svg

plugins:
  - search
  - awesome-pages
  - include-markdown

nav:
  - Home: index.md
  - 📚 Guides:
    - Architecture & Patterns:
        - CQRS & Messaging: cqrs-architecture.md
        - Result Pattern: result-pattern.md
        - Specifications: specifications.md
        - Wolverine Messages: wolverine-message-handling.md
        - Product Catalog Decoupling: architecture/product-catalog-reviews-decoupling.md
    - Endpoints:
        - REST Endpoint: rest-endpoint.md
        - GraphQL Endpoint: graphql-endpoint.md
        - GraphQL Guide: graphql-implementation-guide.md
        - How To Create Endpoint: how-to-create-endpoint.md
        - Endpoint Showcase: endpoint-showcase.md
        - Scalar & UI: scalar-and-graphql-ui.md
    - Databases & Migrations:
        - EF Migration: ef-migration.md
        - MongoDB Migration: mongodb-migration.md
        - MongoDB Polymorphism: mongodb-polymorphism.md
        - Stored Procedures: stored-procedures.md
        - Transactions: transactions.md
    - Security & Auth:
        - Authentication: AUTHENTICATION.md
        - Auth Registration: auth-registration.md
        - Keycloak Workflow: keycloak-auth-workflow.md
        - Security Guidelines: SECURITY.md
        - Rate Limiting: RATE_LIMITING.md
    - Testing:
        - Testing Guide: testing.md
        - Fast Unit Audit: testing-fast-unit-audit.md
    - Infrastructure & Operations:
        - Caching: CACHING.md
        - Observability: observability.md
        - Mailing: mailing.md
        - File Upload Saga: file-upload-saga.md
        - Git Hooks: GIT_HOOKS.md
    - Refactoring & Code Quality:
        - Code Review: code-review.md
        - Validation: validation.md
        - Remaining Refactoring: remaining-refactoring.md
