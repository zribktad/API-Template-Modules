site_name: APITemplate Monolith
site_url: https://zribktad.github.io/API-Template-Modules/
site_description: Modern .NET 10 Web API and Data-Driven applications template.

theme:
  name: material
  language: en
  favicon: assets/favicon.png
  logo: material/library
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.top
    - navigation.tracking
    - navigation.indexes
    - toc.follow
    - toc.integrate
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tooltips

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/zribktad/API-Template-Modules
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/your-profile # TODO: Uprav si

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - def_list
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      check_paths: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:pymdownx.emoji.twemoji
      emoji_generator: !!python/name:pymdownx.emoji.to_svg

plugins:
  - search
  - awesome-pages
  - include-markdown

nav:
  - Home: index.md
  - Guides:
      - rest-endpoint.md
      - graphql-endpoint.md
      - testing.md
      - validation.md
