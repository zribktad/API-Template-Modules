groups:
  - name: apitemplate-slo-availability
    rules:
      # SLO: 99.9% of requests must not be 5xx
      - alert: APITemplateAvailabilityBurnRateHigh
        expr: |
          (
            sum(rate(http_server_request_duration_seconds_count{http_response_status_code=~"5.."}[1h])) 
            / 
            clamp_min(sum(rate(http_server_request_duration_seconds_count[1h])), 1)
          ) > (14.4 * 0.001)
          and
          (
            sum(rate(http_server_request_duration_seconds_count{http_response_status_code=~"5.."}[5m])) 
            / 
            clamp_min(sum(rate(http_server_request_duration_seconds_count[5m])), 1)
          ) > (14.4 * 0.001)
        for: 2m
        labels:
          severity: critical
          slo: availability
        annotations:
          summary: "High burn rate for Availability SLO (Critical)"
          description: "The availability error budget is being consumed at a rate of 14.4x. Current error rate is above 1.44%."

      - alert: APITemplateAvailabilityBurnRateModerate
        expr: |
          (
            sum(rate(http_server_request_duration_seconds_count{http_response_status_code=~"5.."}[6h])) 
            / 
            clamp_min(sum(rate(http_server_request_duration_seconds_count[6h])), 1)
          ) > (6 * 0.001)
          and
          (
            sum(rate(http_server_request_duration_seconds_count{http_response_status_code=~"5.."}[30m])) 
            / 
            clamp_min(sum(rate(http_server_request_duration_seconds_count[30m])), 1)
          ) > (6 * 0.001)
        for: 15m
        labels:
          severity: warning
          slo: availability
        annotations:
          summary: "Moderate burn rate for Availability SLO (Warning)"
          description: "The availability error budget is being consumed at a rate of 6x. Current error rate is above 0.6%."

  - name: apitemplate-slo-latency
    rules:
      # SLO: 99% of requests must be under 500ms
      - alert: APITemplateLatencyBurnRateHigh
        expr: |
          (
            1 - (
              sum(rate(http_server_request_duration_seconds_bucket{le="0.5"}[1h])) 
              / 
              clamp_min(sum(rate(http_server_request_duration_seconds_count[1h])), 1)
            )
          ) > (14.4 * 0.01)
          and
          (
            1 - (
              sum(rate(http_server_request_duration_seconds_bucket{le="0.5"}[5m])) 
              / 
              clamp_min(sum(rate(http_server_request_duration_seconds_count[5m])), 1)
            )
          ) > (14.4 * 0.01)
        for: 2m
        labels:
          severity: critical
          slo: latency
        annotations:
          summary: "High burn rate for Latency SLO (Critical)"
          description: "The latency error budget (p99 < 500ms) is being consumed at a rate of 14.4x. Current error rate is above 14.4%."

      - alert: APITemplateLatencyBurnRateModerate
        expr: |
          (
            1 - (
              sum(rate(http_server_request_duration_seconds_bucket{le="0.5"}[6h])) 
              / 
              clamp_min(sum(rate(http_server_request_duration_seconds_count[6h])), 1)
            )
          ) > (6 * 0.01)
          and
          (
            1 - (
              sum(rate(http_server_request_duration_seconds_bucket{le="0.5"}[30m])) 
              / 
              clamp_min(sum(rate(http_server_request_duration_seconds_count[30m])), 1)
            )
          ) > (6 * 0.01)
        for: 15m
        labels:
          severity: warning
          slo: latency
        annotations:
          summary: "Moderate burn rate for Latency SLO (Warning)"
          description: "The latency error budget (p99 < 500ms) is being consumed at a rate of 6x. Current error rate is above 6%."

  - name: apitemplate-infrastructure
    rules:
      - alert: APITemplateTelemetryMissing
        expr: absent(http_server_request_duration_seconds_count)
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: APITemplate telemetry is missing
          description: Prometheus has not received request metrics from the API for 10 minutes.

      - alert: APITemplateBackendHealthDegraded
        expr: max_over_time(apitemplate_healthcheck_status{service=~"postgresql|mongodb|dragonfly"}[5m]) < 1
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: A backend dependency health check is failing
          description: One of the database or cache dependencies has reported an unhealthy state.
